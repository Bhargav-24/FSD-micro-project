{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BollyFlix - Trending</title>
    <link rel="stylesheet" href="{% static 'streaming/css/styles.css' %}">
</head>
<body style="background-color: #141414; color: white; font-family: sans-serif;">

    <nav style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <a href="{% url 'home' %}" style="color: #E50914; font-size: 24px; text-decoration: none; font-weight: bold;">BOLLYFLIX</a>
        <div>
            <span style="margin-right: 20px;">Welcome, {{ username }}</span>
            <a href="{% url 'logout' %}" style="background: #E50914; color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px;">Logout</a>
        </div>
    </nav>

    <div class="container" style="padding: 20px;">
        <h1>Trending Now</h1>
        <div class="movie-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
            {% for movie in movies %}
            <div class="movie-card" style="text-align: center;">
                <a href="{% url 'movie_detail' movie.id %}" style="text-decoration: none; color: white;">
                    <img src="{{ movie.image_url }}" alt="{{ movie.title }}" style="width: 100%; border-radius: 8px;">
                    <p style="margin-top: 10px; font-weight: bold;">{{ movie.title }}</p>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
