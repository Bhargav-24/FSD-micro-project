{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - BollyFlix</title>
    <link rel="stylesheet" href="{% static 'streaming/css/styles.css' %}">
</head>
<body style="background-color: #141414; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">

    <div class="login-box" style="background: rgba(0,0,0,0.85); padding: 50px; border-radius: 4px; text-align: center; width: 300px;">
        <h1 style="color: #E50914;">Sign Up</h1>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Choose a username" required 
                   style="padding: 10px; width: 100%; margin-bottom: 15px; border-radius: 4px; border: none;">
            <br>
            <input type="password" name="password" placeholder="Create a password" required 
                   style="padding: 10px; width: 100%; margin-bottom: 20px; border-radius: 4px; border: none;">
            <br>
            <button type="submit" style="width: 100%; padding: 10px; border: none; cursor: pointer; background-color: #E50914; color: white; font-weight: bold; border-radius: 4px;">
                Create Account
            </button>
        </form>
        
        <p style="margin-top: 15px;">Already have an account? <a href="{% url 'login' %}" style="color: #E50914;">Log In</a></p>
    </div>

</body>
</html>
